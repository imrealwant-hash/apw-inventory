<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>APW 進銷存管理系統</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
  button { cursor: pointer; font-family: inherit; font-size: 13px; padding: 5px 14px; border: 0.5px solid #ccc; border-radius: 6px; background: white; color: #1a1a1a; transition: background 0.15s; }
  button:hover { background: #f0f0f0; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  input, select { font-family: inherit; font-size: 13px; padding: 7px 10px; border: 0.5px solid #ccc; border-radius: 6px; width: 100%; background: white; color: #1a1a1a; outline: none; }
  input:focus, select:focus { border-color: #185fa5; box-shadow: 0 0 0 2px rgba(24,95,165,0.15); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes progress { 0%{width:0%} 100%{width:90%} }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #f0f0f0; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-HhCE3zkItsQJPODYSYNeEpbo9MdO10D1_qMbF4pJL5N2EfENEViuIVvZi2uEyJ4/exec";
const TABS = ["儀表板","廠商","產品","通路","進貨","銷貨","退貨","報表"];
const fmt = n => Number(n).toLocaleString("zh-TW");

async function api(action, type, data) {
  const res = await fetch(SCRIPT_URL, { method:"POST", body:JSON.stringify({action,type,data}) });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error);
  return json.data;
}
async function apiGet(type) {
  const res = await fetch(`${SCRIPT_URL}?type=${type}`);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error);
  return json.data;
}

const { useState, useEffect, useMemo } = React;

function Badge({ children, color="gray" }) {
  const map = { gray:["#f1f1f1","#555"], blue:["#e6f1fb","#185fa5"], green:["#eaf3de","#3b6d11"], amber:["#faeeda","#854f0b"], red:["#fcebeb","#a32d2d"] };
  const [bg, fg] = map[color]||map.gray;
  return <span style={{background:bg,color:fg,fontSize:11,padding:"2px 8px",borderRadius:6,fontWeight:500}}>{children}</span>;
}

function Toast({ msg, type }) {
  if (!msg) return null;
  const bg = type==="error"?"#fcebeb":"#eaf3de";
  const fg = type==="error"?"#a32d2d":"#3b6d11";
  return <div style={{position:"fixed",bottom:24,right:24,background:bg,color:fg,border:`1px solid ${fg}`,borderRadius:8,padding:"10px 18px",fontSize:13,fontWeight:500,zIndex:2000,boxShadow:"0 4px 16px rgba(0,0,0,0.12)"}}>{msg}</div>;
}

function Modal({ title, onClose, children }) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
      <div style={{background:"white",borderRadius:12,border:"0.5px solid #ddd",padding:"1.5rem",minWidth:340,maxWidth:480,width:"90%",maxHeight:"85vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
          <h3 style={{fontSize:16,fontWeight:500}}>{title}</h3>
          <button onClick={onClose} style={{border:"none",background:"none",fontSize:20,color:"#999",padding:"0 4px"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div style={{marginBottom:12}}>
      <label style={{display:"block",fontSize:12,color:"#666",marginBottom:4}}>{label}</label>
      {children}
    </div>
  );
}

const EMPTY = {vendors:[],products:[],channels:[],purchases:[],sales:[],returns:[]};

function App() {
  const [tab, setTab] = useState("儀表板");
  const [data, setData] = useState(EMPTY);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});
  const [toast, setToast] = useState(null);
  const [dateRange, setDateRange] = useState({from:"2025-01-01",to:"2026-12-31"});

  const showToast = (msg,type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  const loadAll = async () => {
    setLoading(true);
    try {
      const types = ["vendors","products","channels","purchases","sales","returns"];
      const results = await Promise.all(types.map(t=>apiGet(t)));
      const next = {};
      types.forEach((t,i)=>next[t]=results[i]||[]);
      setData(next);
    } catch(e) { showToast("載入失敗："+e.message,"error"); }
    setLoading(false);
  };

  useEffect(()=>{loadAll();},[]);

  const setF = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const closeModal = ()=>{setModal(null);setForm({});};
  const openAdd = type=>{setModal({type,mode:"add"});setForm({});};
  const openEdit = (type,row)=>{setModal({type,mode:"edit"});setForm({...row});};

  const save = async type => {
    setSaving(true);
    try {
      if (modal.mode==="add") await api("add",type,form);
      else await api("update",type,form);
      await loadAll();
      showToast("儲存成功！");
      closeModal();
    } catch(e) { showToast("儲存失敗："+e.message,"error"); }
    setSaving(false);
  };

  const del = async (type,id) => {
    if (!confirm("確定刪除？")) return;
    setSaving(true);
    try {
      await api("delete",type,{id});
      await loadAll();
      showToast("刪除成功！");
    } catch(e) { showToast("刪除失敗："+e.message,"error"); }
    setSaving(false);
  };

  const filteredSales = useMemo(()=>data.sales.filter(s=>s.date>=dateRange.from&&s.date<=dateRange.to),[data.sales,dateRange]);
  const filteredPurchases = useMemo(()=>data.purchases.filter(p=>p.date>=dateRange.from&&p.date<=dateRange.to),[data.purchases,dateRange]);
  const totalRevenue = filteredSales.reduce((s,x)=>s+x.qty*x.unitPrice,0);
  const totalCost = filteredPurchases.reduce((s,x)=>s+x.qty*x.unitCost,0);
  const totalSalesCost = filteredSales.reduce((s,x)=>{const p=data.products.find(pr=>String(pr.id)===String(x.productId));return s+(p?p.cost*x.qty:0);},0);
  const grossProfit = totalRevenue-totalSalesCost;
  const lowStock = data.products.filter(p=>+p.stock<=5);

  const salesByChannel = useMemo(()=>{
    const map={};
    filteredSales.forEach(s=>{const ch=data.channels.find(c=>String(c.id)===String(s.channelId));const name=ch?ch.name:"未知";map[name]=(map[name]||0)+s.qty*s.unitPrice;});
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  },[filteredSales,data.channels]);

  const salesByProduct = useMemo(()=>{
    const map={};
    filteredSales.forEach(s=>{const pr=data.products.find(p=>String(p.id)===String(s.productId));const name=pr?pr.name:"未知";map[name]=(map[name]||0)+s.qty*s.unitPrice;});
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  },[filteredSales,data.products]);

  const maxCh = salesByChannel.length?Math.max(...salesByChannel.map(x=>x[1])):1;
  const maxPr = salesByProduct.length?Math.max(...salesByProduct.map(x=>x[1])):1;

  const sc = (label,value,color="#1a1a1a") => (
    <div style={{background:"#f5f5f5",borderRadius:8,padding:"0.9rem 1rem",flex:1,minWidth:120}}>
      <div style={{fontSize:11,color:"#888",marginBottom:4}}>{label}</div>
      <div style={{fontSize:20,fontWeight:500,color}}>{value}</div>
    </div>
  );

  const th = {textAlign:"left",padding:"8px 10px",borderBottom:"1px solid #eee",color:"#888",fontSize:12,fontWeight:500};
  const td = {padding:"8px 10px",borderBottom:"1px solid #f0f0f0",color:"#1a1a1a"};
  const inp = {width:"100%"};

  const addBtn = (label,type) => <button onClick={()=>openAdd(type)} style={{marginBottom:12,background:"#185fa5",color:"white",border:"none",padding:"6px 16px",borderRadius:6}}>+ {label}</button>;

  const actionBtns = (type,row) => (
    <td style={td}>
      <button onClick={()=>openEdit(type,row)} style={{marginRight:6,fontSize:12,padding:"2px 10px"}}>編輯</button>
      <button onClick={()=>del(type,row.id)} style={{fontSize:12,padding:"2px 10px",color:"#a32d2d",borderColor:"#f7c1c1"}}>刪除</button>
    </td>
  );

  if (loading) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:14,color:"#888"}}>
      <div style={{width:30,height:30,border:"3px solid #eee",borderTop:"3px solid #185fa5",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      從 Google 試算表載入資料中…
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#f5f5f5"}}>
      {toast && <Toast msg={toast.msg} type={toast.type}/>}
      {saving && <div style={{position:"fixed",top:0,left:0,right:0,height:3,background:"#185fa5",zIndex:3000,animation:"progress 1.5s ease-out forwards"}}/>}

      <div style={{background:"white",borderBottom:"1px solid #eee",padding:"10px 20px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <span style={{fontWeight:500,fontSize:15,color:"#185fa5",marginRight:8}}>APW 進銷存</span>
        {TABS.map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{fontSize:13,padding:"5px 14px",background:tab===t?"#e6f1fb":"transparent",color:tab===t?"#185fa5":"#666",border:tab===t?"1px solid #b5d4f4":"1px solid transparent",borderRadius:20,fontWeight:tab===t?500:400}}>
            {t}
          </button>
        ))}
        <button onClick={loadAll} style={{marginLeft:"auto",fontSize:12,padding:"4px 12px",color:"#666"}}>↺ 重新整理</button>
      </div>

      <div style={{padding:"1.25rem 1.5rem",maxWidth:1100,margin:"0 auto"}}>

        {tab==="儀表板" && (
          <div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:"1.25rem"}}>
              {sc("總銷售額",`NT$ ${fmt(totalRevenue)}`,"#185fa5")}
              {sc("毛利",`NT$ ${fmt(grossProfit)}`,grossProfit>=0?"#3b6d11":"#a32d2d")}
              {sc("進貨金額",`NT$ ${fmt(totalCost)}`)}
              {sc("產品種類",data.products.length)}
              {sc("低庫存警示",lowStock.length,lowStock.length>0?"#a32d2d":"#1a1a1a")}
            </div>
            {lowStock.length>0&&(
              <div style={{background:"#fcebeb",border:"1px solid #f7c1c1",borderRadius:8,padding:"10px 14px",marginBottom:"1.25rem"}}>
                <span style={{color:"#a32d2d",fontSize:13,fontWeight:500}}>⚠ 低庫存產品：</span>
                {lowStock.map(p=><span key={p.id} style={{marginLeft:10,fontSize:13,color:"#a32d2d"}}>{p.name}（剩 {p.stock}）</span>)}
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div style={{background:"white",border:"1px solid #eee",borderRadius:12,padding:"1rem"}}>
                <div style={{fontSize:13,fontWeight:500,marginBottom:12}}>各通路銷售額</div>
                {salesByChannel.length===0&&<div style={{fontSize:12,color:"#aaa"}}>暫無資料</div>}
                {salesByChannel.map(([name,val])=>(
                  <div key={name} style={{marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                      <span>{name}</span><span style={{color:"#888"}}>NT$ {fmt(val)}</span>
                    </div>
                    <div style={{background:"#f0f0f0",borderRadius:4,height:6}}>
                      <div style={{width:`${Math.round(val/maxCh*100)}%`,background:"#185fa5",borderRadius:4,height:6}}/>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{background:"white",border:"1px solid #eee",borderRadius:12,padding:"1rem"}}>
                <div style={{fontSize:13,fontWeight:500,marginBottom:12}}>各產品銷售額</div>
                {salesByProduct.length===0&&<div style={{fontSize:12,color:"#aaa"}}>暫無資料</div>}
                {salesByProduct.map(([name,val])=>(
                  <div key={name} style={{marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                      <span>{name}</span><span style={{color:"#888"}}>NT$ {fmt(val)}</span>
                    </div>
                    <div style={{background:"#f0f0f0",borderRadius:4,height:6}}>
                      <div style={{width:`${Math.round(val/maxPr*100)}%`,background:"#0f6e56",borderRadius:4,height:6}}/>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {tab==="廠商"&&(
          <div>
            {addBtn("新增廠商","vendors")}
            <div style={{background:"white",borderRadius:10,border:"1px solid #eee",overflow:"hidden"}}>
              <table><thead><tr><th style={th}>名稱</th><th style={th}>聯絡人</th><th style={th}>電話</th><th style={th}>操作</th></tr></thead>
              <tbody>{data.vendors.map(v=>(
                <tr key={v.id}><td style={td}>{v.name}</td><td style={td}>{v.contact}</td><td style={td}>{v.phone}</td>{actionBtns("vendors",v)}</tr>
              ))}</tbody></table>
            </div>
          </div>
        )}

        {tab==="產品"&&(
          <div>
            {addBtn("新增產品","products")}
            <div style={{background:"white",borderRadius:10,border:"1px solid #eee",overflow:"hidden"}}>
              <table><thead><tr><th style={th}>名稱</th><th style={th}>類別</th><th style={th}>成本</th><th style={th}>售價</th><th style={th}>庫存</th><th style={th}>操作</th></tr></thead>
              <tbody>{data.products.map(p=>(
                <tr key={p.id}>
                  <td style={td}>{p.name}</td><td style={td}>{p.category}</td>
                  <td style={td}>NT$ {fmt(p.cost)}</td><td style={td}>NT$ {fmt(p.price)}</td>
                  <td style={td}><Badge color={+p.stock<=5?"red":+p.stock<=20?"amber":"green"}>{p.stock}</Badge></td>
                  {actionBtns("products",p)}
                </tr>
              ))}</tbody></table>
            </div>
          </div>
        )}

        {tab==="通路"&&(
          <div>
            {addBtn("新增通路","channels")}
            <div style={{background:"white",borderRadius:10,border:"1px solid #eee",overflow:"hidden"}}>
              <table><thead><tr><th style={th}>通路名稱</th><th style={th}>操作</th></tr></thead>
              <tbody>{data.channels.map(c=>(
                <tr key={c.id}><td style={td}>{c.name}</td>{actionBtns("channels",c)}</tr>
              ))}</tbody></table>
            </div>
          </div>
        )}

        {tab==="進貨"&&(
          <div>
            {addBtn("新增進貨","purchases")}
            <div style={{background:"white",borderRadius:10,border:"1px solid #eee",overflow:"auto"}}>
              <table><thead><tr><th style={th}>日期</th><th style={th}>廠商</th><th style={th}>品名</th><th style={th}>數量</th><th style={th}>單價</th><th style={th}>小計</th><th style={th}>操作</th></tr></thead>
              <tbody>{data.purchases.map(p=>{
                const v=data.vendors.find(x=>String(x.id)===String(p.vendorId));
                const pr=data.products.find(x=>String(x.id)===String(p.productId));
                return(<tr key={p.id}>
                  <td style={td}>{p.date}</td><td style={td}>{v?.name}</td><td style={td}>{pr?.name}</td>
                  <td style={td}>{p.qty}</td><td style={td}>NT$ {fmt(p.unitCost)}</td>
                  <td style={td}>NT$ {fmt(p.qty*p.unitCost)}</td>
                  {actionBtns("purchases",p)}
                </tr>);
              })}</tbody></table>
            </div>
          </div>
        )}

        {tab==="銷貨"&&(
          <div>
            {addBtn("新增銷貨","sales")}
            <div style={{background:"white",borderRadius:10,border:"1px solid #eee",overflow:"auto"}}>
              <table><thead><tr><th style={th}>日期</th><th style={th}>通路</th><th style={th}>品名</th><th style={th}>數量</th><th style={th}>單價</th><th style={th}>小計</th><th style={th}>操作</th></tr></thead>
              <tbody>{data.sales.map(s=>{
                const ch=data.channels.find(x=>String(x.id)===String(s.channelId));
                const pr=data.products.find(x=>String(x.id)===String(s.productId));
                return(<tr key={s.id}>
                  <td style={td}>{s.date}</td><td style={td}>{ch?.name}</td><td style={td}>{pr?.name}</td>
                  <td style={td}>{s.qty}</td><td style={td}>NT$ {fmt(s.unitPrice)}</td>
                  <td style={td}>NT$ {fmt(s.qty*s.unitPrice)}</td>
                  {actionBtns("sales",s)}
                </tr>);
              })}</tbody></table>
            </div>
          </div>
        )}

        {tab==="退貨"&&(
          <div>
            {addBtn("新增退貨","returns")}
            {data.returns.length===0
              ?<div style={{color:"#aaa",fontSize:13,marginTop:12}}>目前無退貨記錄</div>
              :<div style={{background:"white",borderRadius:10,border:"1px solid #eee",overflow:"hidden"}}>
                <table><thead><tr><th style={th}>日期</th><th style={th}>類型</th><th style={th}>品名</th><th style={th}>數量</th><th style={th}>原因</th><th style={th}>操作</th></tr></thead>
                <tbody>{data.returns.map(r=>{
                  const pr=data.products.find(x=>String(x.id)===String(r.productId));
                  return(<tr key={r.id}>
                    <td style={td}>{r.date}</td><td style={td}>{r.type}</td>
                    <td style={td}>{pr?.name}</td><td style={td}>{r.qty}</td><td style={td}>{r.reason}</td>
                    {actionBtns("returns",r)}
                  </tr>);
                })}</tbody></table>
              </div>
            }
          </div>
        )}

        {tab==="報表"&&(
          <div>
            <div style={{display:"flex",gap:12,marginBottom:"1.25rem",alignItems:"flex-end",flexWrap:"wrap"}}>
              <Field label="起始日期"><input type="date" value={dateRange.from} onChange={e=>setDateRange(d=>({...d,from:e.target.value}))} style={{width:160}}/></Field>
              <Field label="結束日期"><input type="date" value={dateRange.to} onChange={e=>setDateRange(d=>({...d,to:e.target.value}))} style={{width:160}}/></Field>
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:"1.5rem"}}>
              {sc("銷售總額",`NT$ ${fmt(totalRevenue)}`,"#185fa5")}
              {sc("銷貨成本",`NT$ ${fmt(totalSalesCost)}`)}
              {sc("毛利",`NT$ ${fmt(grossProfit)}`,grossProfit>=0?"#3b6d11":"#a32d2d")}
              {sc("毛利率",`${totalRevenue?Math.round(grossProfit/totalRevenue*100):0}%`,grossProfit>=0?"#3b6d11":"#a32d2d")}
              {sc("進貨金額",`NT$ ${fmt(totalCost)}`)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:"1.5rem"}}>
              <div style={{background:"white",border:"1px solid #eee",borderRadius:12,padding:"1rem"}}>
                <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>通路銷售統計</div>
                <table><thead><tr><th style={th}>通路</th><th style={th}>銷售額</th></tr></thead>
                <tbody>{salesByChannel.map(([n,v])=><tr key={n}><td style={td}>{n}</td><td style={td}>NT$ {fmt(v)}</td></tr>)}</tbody></table>
              </div>
              <div style={{background:"white",border:"1px solid #eee",borderRadius:12,padding:"1rem"}}>
                <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>產品銷售統計</div>
                <table><thead><tr><th style={th}>產品</th><th style={th}>銷售額</th></tr></thead>
                <tbody>{salesByProduct.map(([n,v])=><tr key={n}><td style={td}>{n}</td><td style={td}>NT$ {fmt(v)}</td></tr>)}</tbody></table>
              </div>
            </div>
            <div style={{background:"white",border:"1px solid #eee",borderRadius:12,padding:"1rem"}}>
              <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>庫存統計</div>
              <table><thead><tr><th style={th}>產品</th><th style={th}>類別</th><th style={th}>成本</th><th style={th}>售價</th><th style={th}>庫存</th><th style={th}>庫存價值</th></tr></thead>
              <tbody>{data.products.map(p=>(
                <tr key={p.id}>
                  <td style={td}>{p.name}</td><td style={td}>{p.category}</td>
                  <td style={td}>NT$ {fmt(p.cost)}</td><td style={td}>NT$ {fmt(p.price)}</td>
                  <td style={td}><Badge color={+p.stock<=5?"red":+p.stock<=20?"amber":"green"}>{p.stock}</Badge></td>
                  <td style={td}>NT$ {fmt(p.cost*p.stock)}</td>
                </tr>
              ))}</tbody></table>
            </div>
          </div>
        )}
      </div>

      {modal&&(
        <Modal title={{"vendors":"廠商","products":"產品","channels":"通路","purchases":"進貨","sales":"銷貨","returns":"退貨"}[modal.type]+(modal.mode==="add"?" — 新增":" — 編輯")} onClose={closeModal}>
          {modal.type==="vendors"&&<>
            <Field label="廠商名稱"><input style={inp} value={form.name||""} onChange={setF("name")}/></Field>
            <Field label="聯絡人"><input style={inp} value={form.contact||""} onChange={setF("contact")}/></Field>
            <Field label="電話"><input style={inp} value={form.phone||""} onChange={setF("phone")}/></Field>
          </>}
          {modal.type==="products"&&<>
            <Field label="產品名稱"><input style={inp} value={form.name||""} onChange={setF("name")}/></Field>
            <Field label="類別"><input style={inp} value={form.category||""} onChange={setF("category")}/></Field>
            <Field label="成本"><input type="number" style={inp} value={form.cost||""} onChange={setF("cost")}/></Field>
            <Field label="售價"><input type="number" style={inp} value={form.price||""} onChange={setF("price")}/></Field>
            <Field label="庫存"><input type="number" style={inp} value={form.stock||""} onChange={setF("stock")}/></Field>
          </>}
          {modal.type==="channels"&&<>
            <Field label="通路名稱"><input style={inp} value={form.name||""} onChange={setF("name")}/></Field>
          </>}
          {modal.type==="purchases"&&<>
            <Field label="日期"><input type="date" style={inp} value={form.date||""} onChange={setF("date")}/></Field>
            <Field label="廠商">
              <select style={inp} value={form.vendorId||""} onChange={setF("vendorId")}>
                <option value="">請選擇</option>
                {data.vendors.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}
              </select>
            </Field>
            <Field label="產品">
              <select style={inp} value={form.productId||""} onChange={e=>{const p=data.products.find(x=>String(x.id)===e.target.value);setForm(f=>({...f,productId:e.target.value,category:p?.category||"",unitCost:p?.cost||""}));}}>
                <option value="">請選擇</option>
                {data.products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </Field>
            <Field label="類別"><input style={inp} value={form.category||""} onChange={setF("category")}/></Field>
            <Field label="數量"><input type="number" style={inp} value={form.qty||""} onChange={setF("qty")}/></Field>
            <Field label="單價（成本）"><input type="number" style={inp} value={form.unitCost||""} onChange={setF("unitCost")}/></Field>
            {form.qty&&form.unitCost&&<div style={{fontSize:13,color:"#888",marginBottom:12}}>小計：NT$ {fmt(form.qty*form.unitCost)}</div>}
          </>}
          {modal.type==="sales"&&<>
            <Field label="日期"><input type="date" style={inp} value={form.date||""} onChange={setF("date")}/></Field>
            <Field label="通路">
              <select style={inp} value={form.channelId||""} onChange={setF("channelId")}>
                <option value="">請選擇</option>
                {data.channels.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </Field>
            <Field label="產品">
              <select style={inp} value={form.productId||""} onChange={e=>{const p=data.products.find(x=>String(x.id)===e.target.value);setForm(f=>({...f,productId:e.target.value,category:p?.category||"",unitPrice:p?.price||""}));}}>
                <option value="">請選擇</option>
                {data.products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </Field>
            <Field label="類別"><input style={inp} value={form.category||""} onChange={setF("category")}/></Field>
            <Field label="數量"><input type="number" style={inp} value={form.qty||""} onChange={setF("qty")}/></Field>
            <Field label="單價（售價）"><input type="number" style={inp} value={form.unitPrice||""} onChange={setF("unitPrice")}/></Field>
            {form.qty&&form.unitPrice&&<div style={{fontSize:13,color:"#888",marginBottom:12}}>小計：NT$ {fmt(form.qty*form.unitPrice)}</div>}
          </>}
          {modal.type==="returns"&&<>
            <Field label="日期"><input type="date" style={inp} value={form.date||""} onChange={setF("date")}/></Field>
            <Field label="退貨類型">
              <select style={inp} value={form.type||""} onChange={setF("type")}>
                <option value="">請選擇</option>
                <option value="進貨退回">進貨退回</option>
                <option value="銷貨退回">銷貨退回</option>
              </select>
            </Field>
            <Field label="產品">
              <select style={inp} value={form.productId||""} onChange={setF("productId")}>
                <option value="">請選擇</option>
                {data.products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </Field>
            <Field label="數量"><input type="number" style={inp} value={form.qty||""} onChange={setF("qty")}/></Field>
            <Field label="原因"><input style={inp} value={form.reason||""} onChange={setF("reason")}/></Field>
          </>}
          <button onClick={()=>save(modal.type)} disabled={saving} style={{width:"100%",marginTop:8,background:"#185fa5",color:"white",border:"none",padding:"8px",borderRadius:6,fontSize:14}}>
            {saving?"儲存中…":"儲存"}
          </button>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
